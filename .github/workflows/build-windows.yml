name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download YOLO model
        run: |
          python -c "from ultralytics import YOLO; YOLO('yolo11s.pt')"

      - name: Build executable
        run: |
          pyinstaller --name SecurityCamera --windowed --onedir --add-data "yolo11s.pt;." --collect-all ultralytics --collect-all torch --collect-all cv2 detect.py

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: SecurityCamera-Windows
          path: dist/SecurityCamera
